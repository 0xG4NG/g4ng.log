<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e"/>
      <stop offset="100%" style="stop-color:#0f1923"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Network lines -->
  <line x1="200" y1="150" x2="400" y2="225" stroke="#6c9eff" stroke-width="2" opacity="0.3"/>
  <line x1="600" y1="150" x2="400" y2="225" stroke="#6c9eff" stroke-width="2" opacity="0.3"/>
  <line x1="400" y1="225" x2="250" y2="340" stroke="#6c9eff" stroke-width="2" opacity="0.3"/>
  <line x1="400" y1="225" x2="400" y2="350" stroke="#6c9eff" stroke-width="2" opacity="0.3"/>
  <line x1="400" y1="225" x2="550" y2="340" stroke="#6c9eff" stroke-width="2" opacity="0.3"/>
  <!-- Router (center) -->
  <rect x="365" y="195" width="70" height="60" rx="8" fill="#1e293b" stroke="#6c9eff" stroke-width="2"/>
  <circle cx="385" cy="215" r="4" fill="#6c9eff"/>
  <circle cx="400" cy="215" r="4" fill="#6c9eff"/>
  <circle cx="415" cy="215" r="4" fill="#34d399"/>
  <line x1="380" y1="235" x2="420" y2="235" stroke="#475569" stroke-width="1"/>
  <rect x="382" y="240" width="8" height="6" rx="1" fill="#475569"/>
  <rect x="394" y="240" width="8" height="6" rx="1" fill="#475569"/>
  <rect x="406" y="240" width="8" height="6" rx="1" fill="#475569"/>
  <!-- WAN cloud -->
  <ellipse cx="200" cy="135" rx="60" ry="35" fill="none" stroke="#6c9eff" stroke-width="1.5" opacity="0.5"/>
  <text x="200" y="140" text-anchor="middle" fill="#6c9eff" font-family="monospace" font-size="14" opacity="0.7">WAN</text>
  <ellipse cx="600" cy="135" rx="60" ry="35" fill="none" stroke="#6c9eff" stroke-width="1.5" opacity="0.5"/>
  <text x="600" y="140" text-anchor="middle" fill="#6c9eff" font-family="monospace" font-size="14" opacity="0.7">ISP</text>
  <!-- LAN devices -->
  <rect x="220" y="320" width="55" height="40" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="248" y="345" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">PC</text>
  <rect x="372" y="330" width="55" height="40" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="355" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">NAS</text>
  <rect x="522" y="320" width="55" height="40" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="550" y="345" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">AP</text>
  <!-- NixOS logo hint -->
  <text x="400" y="95" text-anchor="middle" fill="#6c9eff" font-family="monospace" font-size="28" font-weight="bold" opacity="0.15">NixOS Router</text>
</svg>