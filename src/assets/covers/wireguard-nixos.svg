<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e"/>
      <stop offset="100%" style="stop-color:#0d1a20"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Tunnel visualization -->
  <ellipse cx="180" cy="225" rx="70" ry="90" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="620" cy="225" rx="70" ry="90" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.3"/>
  <!-- Tunnel lines -->
  <line x1="250" y1="160" x2="550" y2="160" stroke="#34d399" stroke-width="1" opacity="0.2" stroke-dasharray="6,4"/>
  <line x1="250" y1="290" x2="550" y2="290" stroke="#34d399" stroke-width="1" opacity="0.2" stroke-dasharray="6,4"/>
  <!-- Encrypted data flow -->
  <rect x="310" y="195" width="180" height="60" rx="30" fill="none" stroke="#34d399" stroke-width="2" opacity="0.4"/>
  <text x="400" y="230" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="14" opacity="0.6">encrypted</text>
  <!-- Server -->
  <rect x="140" y="190" width="80" height="70" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="180" y="218" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="11">server</text>
  <text x="180" y="240" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10">wg0</text>
  <!-- Client -->
  <rect x="580" y="190" width="80" height="70" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="620" y="218" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="11">client</text>
  <text x="620" y="240" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10">wg0</text>
  <!-- Key icons -->
  <g transform="translate(180,310)" opacity="0.5">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="8" y1="0" x2="22" y2="0" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="18" y1="0" x2="18" y2="6" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="22" y1="0" x2="22" y2="6" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  <text x="215" y="315" fill="#fbbf24" font-family="monospace" font-size="10" opacity="0.5">private key</text>
  <g transform="translate(620,310)" opacity="0.5">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="8" y1="0" x2="22" y2="0" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="18" y1="0" x2="18" y2="6" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="22" y1="0" x2="22" y2="6" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  <text x="655" y="315" fill="#fbbf24" font-family="monospace" font-size="10" opacity="0.5">private key</text>
  <!-- Port -->
  <text x="400" y="155" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11" opacity="0.4">:51820/udp</text>
  <!-- Title hint -->
  <text x="400" y="80" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="24" font-weight="bold" opacity="0.1">WireGuard</text>
</svg>