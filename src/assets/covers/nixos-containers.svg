<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e"/>
      <stop offset="100%" style="stop-color:#151020"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Container boxes -->
  <!-- Container 1 -->
  <rect x="100" y="120" width="180" height="130" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="100" y="120" width="180" height="28" rx="8" fill="#a78bfa" opacity="0.15"/>
  <text x="190" y="140" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="12" font-weight="bold">adguard</text>
  <text x="125" y="170" fill="#94a3b8" font-family="monospace" font-size="10">DNS + ad-block</text>
  <text x="125" y="190" fill="#6b7280" font-family="monospace" font-size="10">192.168.1.10</text>
  <rect x="120" y="210" width="50" height="20" rx="4" fill="#a78bfa" opacity="0.15"/>
  <text x="145" y="224" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="9">nspawn</text>
  <!-- Container 2 -->
  <rect x="310" y="120" width="180" height="130" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="310" y="120" width="180" height="28" rx="8" fill="#38bdf8" opacity="0.15"/>
  <text x="400" y="140" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="12" font-weight="bold">jellyfin</text>
  <text x="335" y="170" fill="#94a3b8" font-family="monospace" font-size="10">Media server</text>
  <text x="335" y="190" fill="#6b7280" font-family="monospace" font-size="10">:8096</text>
  <rect x="330" y="210" width="50" height="20" rx="4" fill="#38bdf8" opacity="0.15"/>
  <text x="355" y="224" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="9">OCI</text>
  <!-- Container 3 -->
  <rect x="520" y="120" width="180" height="130" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <rect x="520" y="120" width="180" height="28" rx="8" fill="#fb923c" opacity="0.15"/>
  <text x="610" y="140" text-anchor="middle" fill="#fb923c" font-family="monospace" font-size="12" font-weight="bold">grafana</text>
  <text x="545" y="170" fill="#94a3b8" font-family="monospace" font-size="10">Monitoring</text>
  <text x="545" y="190" fill="#6b7280" font-family="monospace" font-size="10">:3000</text>
  <rect x="540" y="210" width="50" height="20" rx="4" fill="#fb923c" opacity="0.15"/>
  <text x="565" y="224" text-anchor="middle" fill="#fb923c" font-family="monospace" font-size="9">OCI</text>
  <!-- Host base -->
  <rect x="80" y="290" width="640" height="70" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="320" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="14">NixOS Host</text>
  <text x="400" y="340" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="11">configuration.nix</text>
  <!-- Connection lines -->
  <line x1="190" y1="250" x2="190" y2="290" stroke="#a78bfa" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="400" y1="250" x2="400" y2="290" stroke="#38bdf8" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="610" y1="250" x2="610" y2="290" stroke="#fb923c" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="22" font-weight="bold" opacity="0.08">Containers</text>
</svg>