  <text x="348" y="208" fill="#7dd3fc" font-family="monospace" font-size="13">url</text>
  <text x="372" y="208" fill="#6b7280" font-family="monospace" font-size="13">=</text>
  <text x="385" y="208" fill="#86efac" font-family="monospace" font-size="13">"github:..."</text>
  <text x="260" y="231" fill="#c084fc" font-family="monospace" font-size="13">};</text>
  <text x="260" y="258" fill="#94a3b8" font-family="monospace" font-size="13">outputs</text>
